<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>WhatWasThat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { width: 300px; font-family: 'Segoe UI', system-ui, sans-serif; font-size: 13px; background: #0d1117; color: #f0f6fc; }
    .header { display: flex; align-items: center; gap: 8px; padding: 14px 16px 10px; border-bottom: 1px solid #21262d; }
    .logo { font-size: 18px; }
    .title { font-size: 15px; font-weight: 700; }
    .subtitle { font-size: 10px; color: #484f58; font-family: 'Courier New', monospace; }
    .status-bar { display: flex; align-items: center; gap: 7px; padding: 8px 16px; background: #161b22; font-size: 11px; }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; }
    .status-dot.online { background: #3fb950; box-shadow: 0 0 4px #3fb950; }
    .status-dot.offline { background: #ef4444; }
    .status-text { color: #8b949e; }
    .actions { padding: 12px; display: flex; flex-direction: column; gap: 6px; }
    .btn { display: flex; align-items: center; gap: 8px; width: 100%; padding: 9px 12px; border-radius: 7px; border: 1px solid #21262d; background: #161b22; color: #f0f6fc; font-size: 13px; cursor: pointer; text-align: left; }
    .btn:hover:not(:disabled) { background: #1c2128; border-color: #30363d; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn.primary { background: #58a6ff; border-color: #58a6ff; color: #0d1117; font-weight: 600; }
    .shortcut { padding: 8px 12px; background: #161b22; border-top: 1px solid #21262d; font-size: 11px; color: #484f58; display: flex; align-items: center; justify-content: space-between; }
    .kbd { font-family: 'Courier New', monospace; font-size: 10px; color: #8b949e; }
    .kbd span { padding: 1px 5px; background: #21262d; border-radius: 3px; border: 1px solid #30363d; }
    .footer { padding: 8px 12px; border-top: 1px solid #21262d; display: flex; justify-content: space-between; align-items: center; }
    .footer a { color: #58a6ff; font-size: 11px; text-decoration: none; }
    #result-msg { margin: 0 12px; padding: 8px 10px; border-radius: 6px; font-size: 12px; display: none; }
    #result-msg.success { background: rgba(63,185,80,.15); color: #3fb950; border: 1px solid rgba(63,185,80,.3); }
    #result-msg.error { background: rgba(239,68,68,.12); color: #ef4444; border: 1px solid rgba(239,68,68,.3); }
  </style>
</head>
<body>
  <div class="header">
    <span class="logo">◈</span>
    <div>
      <div class="title">WhatWasThat</div>
      <div class="subtitle">/ browser extension</div>
    </div>
  </div>

  <div class="status-bar">
    <div class="status-dot offline" id="status-dot"></div>
    <span class="status-text" id="status-text">Connecting...</span>
  </div>

  <div class="actions">
    <button class="btn primary" id="btn-capture" disabled><span>📸</span><span>Save This Page</span></button>
    <button class="btn" id="btn-capture-sel" disabled><span>✂️</span><span>Save Selection</span></button>
    <button class="btn" id="btn-options-open"><span>⚙️</span><span>Open Options</span></button>
  </div>

  <div id="result-msg"></div>

  <div class="shortcut">
    <span>Quick shortcut:</span>
    <span class="kbd"><span>Alt</span>+<span>Shift</span>+<span>S</span></span>
  </div>

  <div class="footer">
    <span style="color:#484f58;font-size:11px;" id="version-text">v1.1.0</span>
    <a href="#" id="btn-options">Settings</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
